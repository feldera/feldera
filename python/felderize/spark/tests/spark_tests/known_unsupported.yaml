# Manually verified tests that are unsupported in Feldera.
# These are expected failures — no need to investigate further.
#
# Format:
#   <category>:
#     <test_id>: "<reason>"

cast:
  cast_011: "CAST(interval AS string) — Spark returns verbose 'INTERVAL ''3-1'' YEAR TO MONTH'; Feldera returns compact ISO '+3-01'; output format differs, not a translation bug"
  cast_012: "CAST(interval AS string) — Spark returns verbose 'INTERVAL ''3 00:00:01'' DAY TO SECOND'; Feldera returns compact '+3 00:00:01.000000'; output format differs, not a translation bug"
  cast_014: "CAST(invalid string AS numeric) — Spark returns NULL for unparseable input; Feldera drops the row entirely; behavioral difference, not a translation bug"
  cast_021: "CAST(string with \\t\\n\\r whitespace AS BOOLEAN) — Spark trims all whitespace including tabs/newlines before parsing; Feldera only trims spaces, returns False"
  cast_025: "CAST(invalid string AS numeric) — same as cast_014; Spark NULL vs Feldera 0 rows"
  cast_027: "CAST(invalid string AS numeric) — same as cast_014; Spark NULL vs Feldera 0 rows"
  cast_030: "CAST(invalid string AS numeric) — same as cast_014; Spark NULL vs Feldera 0 rows"
  cast_031: "CAST(invalid string AS numeric) — same as cast_014; Spark NULL vs Feldera 0 rows"
  cast_035: "CAST(invalid string AS numeric) — same as cast_014; Spark NULL vs Feldera 0 rows"
  cast_007: "HEX() and CAST AS BINARY — neither supported in Feldera"
  cast_008: "CAST(string AS INTERVAL) — bare INTERVAL with no unit is a parse error; mixed units (month + hour) not representable as a single interval"
  cast_009: "INTERVAL YEAR TO MONTH cannot be a view column type in Feldera — interval types are only usable in arithmetic expressions, not as final output columns"
  cast_010: "INTERVAL DAY TO SECOND cannot be a view column type in Feldera — same as cast_009; CREATE LOCAL VIEW workaround compiles but changes semantics"
  cast_032: "CAST(INTERVAL YEAR AS TINYINT) — interval to integer not implemented in Feldera runtime; RustError: cast_to_i8_LongInterval_YEARS not found"
  cast_034: "CAST(INTERVAL MONTH AS INT) — interval to integer not implemented in Feldera runtime; same as cast_032"
  cast_036: "Compound interval to numeric — CAST(INTERVAL DAY TO SECOND AS INT) is not supported in Feldera"
  cast_037: "CAST(INTERVAL '10' DAY AS BIGINT) — Feldera returns 864000000 (milliseconds); Spark returns 10 (days); different scale"
  cast_038: "Spark-specific integer suffix 1Y (TINYINT) — not valid Feldera syntax; CAST(numeric AS INTERVAL) also unsupported"
  cast_039: "Spark-specific integer suffix -122S (SMALLINT) — not valid Feldera syntax; CAST(numeric AS compound INTERVAL) unsupported"
