  cast_043: "Spark-specific integer suffix 100Y (TINYINT) — not valid Feldera syntax"
  cast_044: "Spark-specific integer suffix 100Y in VALUES — not valid Feldera syntax"
  cast_045: "Spark-specific integer suffix -1000S (SMALLINT) — not valid Feldera syntax"
  cast_046: "CAST(numeric AS INTERVAL DAY) — numeric to interval not supported in Feldera"
  cast_048: "CAST(INTERVAL SECOND AS DECIMAL) — Feldera truncates fractional seconds, returns 1 instead of 1.000001"
  cast_052: "CAST(INTERVAL SECOND AS DECIMAL) — same as cast_048; returns 10 instead of 10.01"
  cast_054: "Spark BigDecimal suffix BD (10.123456BD) — not valid Feldera syntax"
