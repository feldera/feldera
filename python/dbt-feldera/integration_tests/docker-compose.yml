name: feldera-dbt-integration
services:
  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:v23.1.13
    command:
      - redpanda
      - start
      - --smp
      - '1'
      - --reserve-memory
      - 0M
      - --overprovisioned
      - --node-id
      - '0'
      - --kafka-addr
      - PLAINTEXT://0.0.0.0:29092,OUTSIDE://0.0.0.0:19092
      - --advertise-kafka-addr
      - PLAINTEXT://redpanda:29092,OUTSIDE://localhost:19092
      - --pandaproxy-addr
      - PLAINTEXT://0.0.0.0:28082,OUTSIDE://0.0.0.0:18082
      - --advertise-pandaproxy-addr
      - PLAINTEXT://redpanda:28082,OUTSIDE://localhost:18082
    ports:
      - "19092:19092"
      - "18082:18082"
      - "9644:9644"
    healthcheck:
      test: ["CMD-SHELL", "curl --fail --silent http://localhost:9644/v1/status/ready"]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 10s

  delta-init:
    image: alpine
    command: ["sh", "-c", "chmod 1777 /data/delta"]
    volumes:
      - delta-data:/data/delta

  pipeline-manager:
    image: "${FELDERA_IMAGE:-pyfeldera-customer:latest}"
    ports:
      - "${FELDERA_PORT:-8080}:8080"
    tty: true
    stop_grace_period: 0s
    depends_on:
      redpanda:
        condition: service_healthy
      delta-init:
        condition: service_completed_successfully
    volumes:
      - delta-data:/data/delta
    environment:
      - RUST_LOG=${RUST_LOG:-info}
      - RUST_BACKTRACE=1
    healthcheck:
      test: ["CMD-SHELL", "curl --fail --silent --request GET --url http://localhost:8080/healthz"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 30s

  duckdb:
    image: datacatering/duckdb:v1.3.0
    entrypoint: ["/bin/sh", "-c", "/duckdb -c 'INSTALL delta' && sleep infinity"]
    volumes:
      - delta-data:/data/delta:ro
    healthcheck:
      test: ["CMD", "/duckdb", "-c", "LOAD delta; SELECT 1"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 2s

volumes:
  delta-data:
