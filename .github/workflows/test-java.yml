name: Test Java Sources

on:
  workflow_call:

env:
  RUSTC_WRAPPER: sccache
  SCCACHE_CACHE_SIZE: ${{ vars.SCCACHE_CACHE_SIZE }}
  SCCACHE_BUCKET: ${{ vars.SCCACHE_BUCKET }}
  SCCACHE_ENDPOINT: ${{ vars.SCCACHE_ENDPOINT }}
  SCCACHE_REGION: ${{ vars.SCCACHE_REGION }}
  AWS_ACCESS_KEY_ID: "${{ secrets.CI_K8S_MINIO_ACCESS_KEY_ID }}"
  AWS_SECRET_ACCESS_KEY: "${{ secrets.CI_K8S_MINIO_SECRET_ACCESS_KEY }}"
  RUST_MIN_STACK: 8388608
  # Limit number of parallel build jobs to avoid OOM in arm64 CI runners
  CARGO_BUILD_JOBS: 24

jobs:
  java-tests:
    if: ${{ !contains(vars.CI_SKIP_JOBS, 'java-tests') }}
    name: Execute Java Tests (${{ matrix.shard.name }})
    # fail-fast: false so a failure in one shard still lets the others finish
    # and report. Workflow-level cancellation of sibling CI jobs is handled by
    # the cancel-if-tests-java-failed sentinel in ci.yml.
    strategy:
      fail-fast: false
      matrix:
        runner:
          - [k8s-runners-amd64]
          - [k8s-runners-arm64]
        shard:
          - name: A-M
            pattern: "A*,B*,C*,D*,E*,F*,G*,H*,I*,J*,K*,L*,M*"
          - name: N-Z
            pattern: "N*,O*,P*,Q*,R*,S*,T*,U*,V*,W*,X*,Y*,Z*"
    runs-on: ${{ matrix.runner }}

    container:
      image: ghcr.io/feldera/feldera-dev:sha-3613839bd73108aee58017bf75dda42f7a3d0bb4
    steps:
      - name: Show Kubernetes node
        if: always()
        run: |
          echo "K8S node: ${K8S_NODE_NAME}"

      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: |
            /home/ubuntu/.gradle
            ./sql-to-dbsp-compiler/calcite
          key: sql2dbsp-java-cache2-${{ runner.os }}-${{ hashFiles('sql-to-dbsp-compiler/calcite_version.env') }}
          restore-keys: |
            sql2dbsp-java-cache2-${{ runner.os }}-

      # TODO: Avoid doing this twice and ideally download & reuse the JAR from build-java.yml workflow
      - name: Run build.sh
        run: ./build.sh
        working-directory: ./sql-to-dbsp-compiler
        if: ${{ vars.CI_DRY_RUN != 'true' }}
        env:
          CALCITE_BUILD_DIR: ./calcite
          GRADLE_HOME: /home/ubuntu/.gradle

      - name: Stop gradle daemon
        run: gradle --stop

      - name: Run mvn test
        run: mvn test --no-transfer-progress -B -pl SQL-compiler -Dsurefire.failIfNoSpecifiedTests=false -Dtest='${{ matrix.shard.pattern }}'
        working-directory: ./sql-to-dbsp-compiler
        if: ${{ vars.CI_DRY_RUN != 'true' }}

      # Quick SLT smoke check; runs once per arch on the A-M shard so it isn't
      # duplicated across shards (the explicit -Dtest selector is independent
      # of the shard pattern).
      - name: Run one quick SLT test
        if: ${{ vars.CI_DRY_RUN != 'true' && matrix.shard.name == 'A-M' }}
        run: mvn test --no-transfer-progress -B -Dsurefire.failIfNoSpecifiedTests=false -Dtest=RotateTests#quick
        working-directory: ./sql-to-dbsp-compiler

      - name: Print sccache stats
        run: |
          sccache --show-stats
        if: ${{ vars.CI_DRY_RUN != 'true' }}
