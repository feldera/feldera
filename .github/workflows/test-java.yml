name: Test Java Sources

on:
  workflow_call:
  workflow_dispatch:

env:
  RUSTC_WRAPPER: sccache
  SCCACHE_CACHE_SIZE: ${{ vars.SCCACHE_CACHE_SIZE }}
  SCCACHE_BUCKET: ${{ vars.SCCACHE_BUCKET }}
  SCCACHE_ENDPOINT: ${{ vars.SCCACHE_ENDPOINT }}
  SCCACHE_REGION: ${{ vars.SCCACHE_REGION }}
  AWS_ACCESS_KEY_ID: "${{ secrets.CI_K8S_MINIO_ACCESS_KEY_ID }}"
  AWS_SECRET_ACCESS_KEY: "${{ secrets.CI_K8S_MINIO_SECRET_ACCESS_KEY }}"
  # sccache cannot cache rustc invocations when incremental is on; without
  # this the prior run showed 0% Rust cache hit rate and 11k write errors.
  CARGO_INCREMENTAL: 0
  # Pin Maven's local repo so it matches the cache path regardless of the
  # container runner's $HOME.
  MAVEN_OPTS: -Dmaven.repo.local=/home/ubuntu/.m2/repository
  RUST_MIN_STACK: 8388608
  # Cap cargo parallelism at the k8s runner core budget. Java tests drive a
  # Rust build via mvn → sql-to-dbsp; without this cap arm64 runners OOM from
  # too many parallel linkers. Override at the org/repo level via the
  # CI_RUNNER_CORES variable; the fallback matches the current 20-core pod.
  CARGO_BUILD_JOBS: ${{ vars.CI_RUNNER_CORES || 20 }}

jobs:
  java-tests:
    if: ${{ !contains(vars.CI_SKIP_JOBS, 'java-tests') }}
    name: Execute Java Tests (${{ matrix.shard.name }})
    # fail-fast: false so a failure in one shard still lets the others finish
    # and report. Workflow-level cancellation of sibling CI jobs is handled by
    # the cancel-if-tests-java-failed sentinel in ci.yml.
    strategy:
      fail-fast: false
      matrix:
        runner:
          - [k8s-runners-amd64]
          - [k8s-runners-arm64]
        shard:
          - name: A-M
            pattern: "A*,B*,C*,D*,E*,F*,G*,H*,I*,J*,K*,L*,M*"
          - name: N-Z
            pattern: "N*,O*,P*,Q*,R*,S*,T*,U*,V*,W*,X*,Y*,Z*"
    runs-on: ${{ matrix.runner }}

    container:
      image: ghcr.io/feldera/feldera-dev:sha-3613839bd73108aee58017bf75dda42f7a3d0bb4
    steps:
      - name: Show Kubernetes node
        if: always()
        run: |
          echo "K8S node: ${K8S_NODE_NAME}"

      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Cache Cargo registry
        uses: ./.github/actions/feldera-minio-cache
        with:
          # Only the crate downloads, NOT target/. The SQL test suite compiles
          # a unique Rust pipeline per test into sql-to-dbsp-compiler/temp/target,
          # which balloons to 20-45 GB; gzipping that on save cost ~1h of wall
          # clock and the artifacts are single-use anyway. Per-crate compile
          # caching is sccache's job. registry/src is excluded — cargo
          # regenerates it from registry/cache archives.
          path: |
            ~/.cargo/registry/cache
            ~/.cargo/registry/index
            ~/.cargo/git/db
          key: test-java-cargo-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            test-java-cargo-${{ runner.os }}-${{ runner.arch }}-

      - name: Cache JVM build dependencies
        uses: ./.github/actions/feldera-minio-cache
        with:
          path: |
            /home/ubuntu/.gradle
            /home/ubuntu/.m2/repository
            ./sql-to-dbsp-compiler/calcite
          key: test-java-jvm-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('sql-to-dbsp-compiler/calcite_version.env', 'sql-to-dbsp-compiler/**/pom.xml') }}
          restore-keys: |
            test-java-jvm-${{ runner.os }}-${{ runner.arch }}-

      # TODO: Avoid doing this twice and ideally download & reuse the JAR from build-java.yml workflow
      - name: Run build.sh
        run: ./build.sh
        working-directory: ./sql-to-dbsp-compiler
        if: ${{ vars.CI_DRY_RUN != 'true' }}
        env:
          CALCITE_BUILD_DIR: ./calcite
          GRADLE_HOME: /home/ubuntu/.gradle

      - name: Stop gradle daemon
        run: gradle --stop

      - name: Run mvn test
        run: mvn test --no-transfer-progress -B -pl SQL-compiler -Dsurefire.failIfNoSpecifiedTests=false -Dtest='${{ matrix.shard.pattern }}'
        working-directory: ./sql-to-dbsp-compiler
        if: ${{ vars.CI_DRY_RUN != 'true' }}

      # Quick SLT smoke check; runs once per arch on the A-M shard so it isn't
      # duplicated across shards (the explicit -Dtest selector is independent
      # of the shard pattern).
      - name: Run one quick SLT test
        if: ${{ vars.CI_DRY_RUN != 'true' && matrix.shard.name == 'A-M' }}
        run: mvn test --no-transfer-progress -B -Dsurefire.failIfNoSpecifiedTests=false -Dtest=RotateTests#quick
        working-directory: ./sql-to-dbsp-compiler

      - name: Print sccache stats
        run: |
          sccache --show-stats
        if: ${{ vars.CI_DRY_RUN != 'true' }}
