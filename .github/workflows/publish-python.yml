name: Upload Python Package

permissions:
  contents: read
  id-token: write

on:
  workflow_call:
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (WARNING: Only use for emergency fixes, not for regular releases)"
        required: false
        type: string

defaults:
  run:
    shell: bash
    working-directory: ./python

jobs:
  # Note this code is currently duplicated in ci-post-release, due to PyPi
  # limitations with reusable workflows, see comment there.
  # If you make changes here please also update ci-post-release.yml accordingly.
  deploy:
    runs-on: ubuntu-latest-amd64
    environment:
      name: release
      url: https://pypi.org/p/feldera

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ inputs.tag || github.ref }}
      - name: Install uv
        uses: astral-sh/setup-uv@6dfebec6ddbcd197e02256fbdf54deb334fb7f06 # v2
        with:
          version: "0.11.3"
          enable-cache: true
          cache-dependency-glob: "python/uv.lock"
      - name: "Set up Python"
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version-file: "python/pyproject.toml"
      - name: Install the project
        run: uv sync --all-extras --dev
      - name: Build package
        run: |
          uv build

      - name: Publish package
        if: ${{ vars.RELEASE_DRY_RUN == 'false' }}
        uses: pypa/gh-action-pypi-publish@ed0c53931b1dc9bd32cbe73a98c7f6766f8a527e # ed0c53931b1dc9bd32cbe73a98c7f6766f8a527e
        with:
          packages-dir: ./python/dist

      - name: Minimize uv cache
        run: uv cache prune --ci

  deploy-dbt-feldera:
    runs-on: ubuntu-latest-amd64
    environment:
      name: release
      url: https://pypi.org/p/dbt-feldera

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ inputs.tag || github.ref }}
      - name: Install uv
        uses: astral-sh/setup-uv@6dfebec6ddbcd197e02256fbdf54deb334fb7f06 # v2
        with:
          version: "0.11.3"
          enable-cache: true
      - name: "Set up Python"
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.10"
      - name: Install and build dbt-feldera
        working-directory: ./python/dbt-feldera
        run: |
          uv venv
          uv pip install -e ".[dev]"
          uv build
      - name: Publish dbt-feldera
        if: ${{ vars.RELEASE_DRY_RUN == 'false' }}
        uses: pypa/gh-action-pypi-publish@ed0c53931b1dc9bd32cbe73a98c7f6766f8a527e # ed0c53931b1dc9bd32cbe73a98c7f6766f8a527e
        with:
          packages-dir: ./python/dbt-feldera/dist

      - name: Minimize uv cache
        working-directory: ./python/dbt-feldera
        run: uv cache prune --ci

  deploy-felderize:
    runs-on: ubuntu-latest-amd64
    environment:
      name: release
      url: https://pypi.org/p/felderize

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ inputs.tag || github.ref }}
      - name: Install uv
        uses: astral-sh/setup-uv@6dfebec6ddbcd197e02256fbdf54deb334fb7f06 # v2
        with:
          version: "0.11.3"
          enable-cache: true
      - name: "Set up Python"
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.10"
      - name: Install and build felderize
        working-directory: ./python/felderize
        run: |
          uv venv
          uv pip install -e .
          uv build
      - name: Publish felderize
        if: ${{ vars.RELEASE_DRY_RUN == 'false' }}
        uses: pypa/gh-action-pypi-publish@ed0c53931b1dc9bd32cbe73a98c7f6766f8a527e # ed0c53931b1dc9bd32cbe73a98c7f6766f8a527e
        with:
          packages-dir: ./python/felderize/dist

      - name: Minimize uv cache
        working-directory: ./python/felderize
        run: uv cache prune --ci
